<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="HelmForge logo">
  <!-- Background -->
  <rect width="320" height="320" rx="32" fill="#0A2540"/>

  <!-- Ocean-navy inner ring -->
  <circle cx="160" cy="140" r="86" fill="none" stroke="#1E3A5F" stroke-width="4"/>

  <!-- Helm wheel: outer rim -->
  <circle cx="160" cy="140" r="72" fill="none" stroke="#E5E7EB" stroke-width="6"/>
  <!-- Inner hub -->
  <circle cx="160" cy="140" r="14" fill="#F59E0B" stroke="#FBBF24" stroke-width="2"/>
  <circle cx="160" cy="140" r="4" fill="#0A2540"/>

  <!-- 8 spokes -->
  <g stroke="#E5E7EB" stroke-width="6" stroke-linecap="round">
    <line x1="160" y1="68"  x2="160" y2="212"/>
    <line x1="88"  y1="140" x2="232" y2="140"/>
    <line x1="109" y1="89"  x2="211" y2="191"/>
    <line x1="211" y1="89"  x2="109" y2="191"/>
  </g>

  <!-- 8 handle knobs on the rim -->
  <g fill="#F59E0B">
    <circle cx="160" cy="58"  r="9"/>
    <circle cx="160" cy="222" r="9"/>
    <circle cx="78"  cy="140" r="9"/>
    <circle cx="242" cy="140" r="9"/>
    <circle cx="102" cy="82"  r="9"/>
    <circle cx="218" cy="82"  r="9"/>
    <circle cx="102" cy="198" r="9"/>
    <circle cx="218" cy="198" r="9"/>
  </g>

  <!-- Forge flame overlapping hub -->
  <g>
    <path d="M160 118
             C 150 130, 148 142, 156 152
             C 152 146, 158 142, 160 148
             C 162 142, 168 146, 164 152
             C 172 142, 170 130, 160 118 Z"
          fill="#F59E0B" opacity="0.95"/>
    <path d="M160 128
             C 155 136, 154 144, 158 150
             C 160 146, 162 148, 160 152
             C 158 148, 160 146, 162 150
             C 166 144, 165 136, 160 128 Z"
          fill="#FDE68A" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="160" y="270" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="1">HelmForge</text>
    <text x="160" y="298" font-size="13" fill="#9CA3AF" letter-spacing="4">TAKE&#160;THE&#160;HELM</text>
  </g>
</svg>
