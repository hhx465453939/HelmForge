<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="HelmForge header">
  <defs>
    <linearGradient id="hdrBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0A2540"/>
      <stop offset="60%"  stop-color="#0F2F55"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="220" fill="url(#hdrBg)"/>

  <!-- Horizontal accent line -->
  <line x1="60" y1="180" x2="1140" y2="180" stroke="#F59E0B" stroke-width="1" opacity="0.35"/>

  <!-- Compact helm + flame (left) -->
  <g transform="translate(120,110)">
    <circle r="60" fill="none" stroke="#E5E7EB" stroke-width="4"/>
    <g stroke="#E5E7EB" stroke-width="4" stroke-linecap="round">
      <line x1="0"   y1="-60" x2="0"  y2="60"/>
      <line x1="-60" y1="0"   x2="60" y2="0"/>
      <line x1="-42" y1="-42" x2="42" y2="42"/>
      <line x1="42"  y1="-42" x2="-42" y2="42"/>
    </g>
    <g fill="#F59E0B">
      <circle cx="0"   cy="-68" r="6"/>
      <circle cx="0"   cy="68"  r="6"/>
      <circle cx="-68" cy="0"   r="6"/>
      <circle cx="68"  cy="0"   r="6"/>
      <circle cx="-48" cy="-48" r="6"/>
      <circle cx="48"  cy="-48" r="6"/>
      <circle cx="-48" cy="48"  r="6"/>
      <circle cx="48"  cy="48"  r="6"/>
    </g>
    <circle r="12" fill="#F59E0B" stroke="#FBBF24" stroke-width="2"/>
    <path d="M0 -16 C -8 -4, -10 6, -4 12 C -1 8, 1 10, 0 14 C -1 10, 1 8, 4 12 C 10 6, 8 -4, 0 -16 Z"
          fill="#FDE68A" opacity="0.9"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="230" y="105" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="1">HelmForge</text>
    <text x="230" y="145" font-size="20" fill="#F59E0B">Forge your enterprise. Take the helm.</text>
  </g>

  <g transform="translate(1140,110)" text-anchor="end" font-family="Inter, 'Segoe UI', sans-serif">
    <text x="0" y="-6" font-size="12" fill="#9CA3AF" letter-spacing="3">FORGE TRILOGY · III</text>
    <text x="0" y="14" font-size="12" fill="#F59E0B" letter-spacing="3">CEO · CFO · COO</text>
  </g>
</svg>
